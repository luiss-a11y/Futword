<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="FutWord — o jogo de palavras do futebol brasileiro">
<meta name="theme-color" content="#0a0f0a">
<title>FutWord ⚽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4a017;
  --gold-dim: #a07810;
  --white: #f0f4f0;
  --muted: #7a9a7a;
  --bg: #080d08;
  --surface: #0e160e;
  --surface2: #141e14;
  --correct: #2d7a2d;
  --correct-text: #c8f0c8;
  --present: #8a6200;
  --present-text: #ffd970;
  --absent: #1e261e;
  --absent-text: #4a664a;
  --border: #1e2e1e;
  --border-light: #2a3e2a;
  --locked: #0a120a;
  --locked-text: #2a3e2a;
}
body.light {
  --gold: #b8860b;
  --gold-dim: #9a7209;
  --white: #1a2e1a;
  --muted: #5a7a5a;
  --bg: #eef3ea;
  --surface: #ffffff;
  --surface2: #e4ecde;
  --correct: #3a9a3a;
  --correct-text: #ffffff;
  --present: #c9931a;
  --present-text: #ffffff;
  --absent: #c2cdba;
  --absent-text: #6a7a64;
  --border: #d0dac8;
  --border-light: #b8c6ae;
  --locked: #dde4d6;
  --locked-text: #a0b096;
}
body.light .key { border-bottom-color: #c0ccb6; }
body.light body::before { background: radial-gradient(ellipse at top, rgba(120,180,80,0.15) 0%, transparent 70%); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed;
  top: -20%; left: 50%;
  transform: translateX(-50%);
  width: 140%; height: 60%;
  background: radial-gradient(ellipse at top, rgba(30,90,30,0.18) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  max-width: 500px; margin: 0 auto; padding: 0 12px 32px;
}

/* HEADER */
header {
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 12px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 14px;
}
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--white); line-height: 1; }
.logo span { color: var(--gold); }
.header-right { text-align: right; }
.challenge-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 2px; }
.tagline { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

/* STREAK BAR */
#streak-bar {
  width: 100%;
  display: flex; gap: 8px; align-items: center;
  background: var(--surface);
  border: 0.5px solid var(--border-light);
  border-radius: 10px;
  padding: 8px 16px;
  margin-bottom: 12px;
}
.streak-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
.streak-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--white); line-height: 1; }
.streak-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.streak-div { width: 0.5px; height: 28px; background: var(--border-light); }

/* LEVEL INDICATORS */
#level-nav {
  width: 100%;
  display: flex; gap: 6px;
  margin-bottom: 12px;
}
.lvl-btn {
  flex: 1; padding: 8px 4px;
  background: var(--surface);
  border: 1.5px solid var(--border-light);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 1px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: all 0.2s;
  position: relative;
}
.lvl-btn.active { border-color: var(--gold); color: var(--gold); }
.lvl-btn.done { border-color: var(--correct); color: var(--correct-text); background: rgba(45,122,45,0.15); }
.lvl-btn.locked { border-color: var(--border); color: var(--locked-text); cursor: not-allowed; background: var(--locked); }
.lvl-dots { display: flex; gap: 3px; }
.lvl-dot { width: 6px; height: 6px; border-radius: 1px; background: var(--border-light); }
.lvl-btn.active .lvl-dot { background: var(--gold); }
.lvl-btn.done .lvl-dot { background: var(--correct); }
.lvl-lock { font-size: 12px; }

/* BOARD */
#board { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.row { display: flex; gap: 5px; justify-content: center; }
.tile {
  width: 52px; height: 52px;
  border: 1.5px solid var(--border-light);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; color: var(--white); text-transform: uppercase;
  background: var(--surface);
  transition: border-color 0.15s, transform 0.1s;
}
.tile.filled { transform: scale(1.06); }
.tile.correct { background: var(--correct); border-color: var(--correct); color: var(--correct-text); transform: none; }
.tile.present { background: var(--present); border-color: var(--present); color: var(--present-text); transform: none; }
.tile.absent  { background: var(--absent);  border-color: var(--absent);  color: var(--absent-text);  transform: none; }
.tile.reveal  { animation: flip 0.4s ease forwards; }
@keyframes flip {
  0%   { transform: rotateX(0); }
  50%  { transform: rotateX(90deg); opacity: 0.5; }
  100% { transform: rotateX(0); opacity: 1; }
}

/* STATUS */
#status { min-height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; margin-bottom: 8px; }
#message { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; text-align: center; }
#message.win  { color: #6dbe6d; font-weight: 600; }
#message.lose { color: #d46060; }
#hint-box { font-size: 11px; color: var(--gold-dim); text-align: center; }

/* LEGEND */
#legend { display: flex; gap: 14px; align-items: center; justify-content: center; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.legend-dot.correct { background: var(--correct); }
.legend-dot.present { background: var(--present); }
.legend-dot.absent  { background: var(--absent); border: 0.5px solid var(--border-light); }

/* KEYBOARD */
#keyboard { width: 100%; display: flex; flex-direction: column; gap: 6px; align-items: center; margin-bottom: 12px; }
.kb-row { display: flex; gap: 4px; justify-content: center; }
.key {
  width: 34px; height: 48px; padding: 0;
  background: var(--surface2);
  border: 1.5px solid var(--border-light);
  border-bottom: 3px solid #0d160d;
  border-radius: 6px;
  color: var(--white);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  text-transform: uppercase; user-select: none;
  transition: background 0.15s, color 0.15s, transform 0.08s, border-bottom 0.08s;
  -webkit-tap-highlight-color: transparent; flex-shrink: 0;
}
.key:active { transform: translateY(2px); border-bottom-width: 1px; }
.key.wide { width: 52px; font-size: 11px; letter-spacing: 0.5px; }
.key.correct { background: var(--correct); border-color: var(--correct); border-bottom-color: #1a4a1a; color: var(--correct-text); }
.key.present { background: var(--present); border-color: var(--present); border-bottom-color: #5a3e00; color: var(--present-text); }
.key.absent  { background: var(--absent);  border-color: var(--absent);  border-bottom-color: #0d160d; color: var(--absent-text); }

/* END BUTTONS */
#btn-row { display: none; gap: 8px; width: 100%; justify-content: center; margin-top: 4px; flex-wrap: wrap; }
#next-level {
  padding: 10px 24px;
  background: var(--correct); border: none;
  border-radius: 8px; color: var(--correct-text);
  font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px;
  cursor: pointer; transition: opacity 0.2s;
}
#next-level:active { opacity: 0.8; }
#share-btn, #share-img-btn {
  padding: 10px 16px;
  background: transparent; border: 0.5px solid var(--border-light);
  border-radius: 8px; color: var(--muted);
  font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
#share-btn:hover, #share-img-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* COMPLETED SCREEN */
#completed-screen {
  display: none;
  flex-direction: column; align-items: center;
  text-align: center; gap: 12px; padding: 24px 0;
  width: 100%;
}
#completed-screen h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); }
#completed-screen p { font-size: 13px; color: var(--muted); line-height: 1.6; }
#completed-emoji { font-size: 28px; line-height: 1.5; letter-spacing: 2px; }
#final-share, #final-share-img {
  padding: 10px 24px;
  background: var(--correct); border: none; border-radius: 8px;
  color: var(--correct-text); font-family: 'Bebas Neue', sans-serif;
  font-size: 18px; letter-spacing: 2px; cursor: pointer;
}
#final-share-img { background: transparent; border: 0.5px solid var(--border-light); color: var(--gold); }

/* TOAST */
#toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-60px);
  background: var(--surface2); border: 0.5px solid var(--border-light);
  color: var(--white); font-size: 13px; padding: 8px 20px;
  border-radius: 20px; transition: transform 0.3s ease;
  z-index: 100; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* LOCKED OVERLAY */
#locked-msg {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; padding: 32px 0; text-align: center;
}
#locked-msg .lock-icon { font-size: 36px; }
#locked-msg p { font-size: 13px; color: var(--muted); }

@media (max-width: 400px) {
  .tile { width: 46px; height: 46px; font-size: 20px; }
  .key  { width: 30px; height: 44px; font-size: 12px; }
  .key.wide { width: 46px; }
}
@media (max-width: 340px) {
  .tile { width: 40px; height: 40px; font-size: 18px; }
  .key  { width: 26px; height: 40px; font-size: 11px; }
  .key.wide { width: 40px; }
}

/* ── MODE TABS ── */
#mode-tabs { width: 100%; display: flex; gap: 6px; margin-bottom: 12px; }
.mode-tab {
  flex: 1; padding: 8px;
  background: var(--surface); border: 1.5px solid var(--border-light);
  border-radius: 8px; color: var(--muted);
  font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1px;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.mode-tab.active { border-color: var(--gold); color: var(--gold); }

/* ── TOOLBAR ── */
#toolbar { width: 100%; display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; }
.tool-btn {
  width: 36px; height: 36px;
  background: var(--surface); border: 0.5px solid var(--border-light);
  border-radius: 8px; color: var(--muted); cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.tool-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
.tool-btn.off { opacity: 0.4; }

/* ── CONFETTI ── */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
.confetti-piece { position: absolute; width: 9px; height: 9px; top: -20px; opacity: 0.9; will-change: transform; }

/* ── MODAL ── */
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 150;
  align-items: center; justify-content: center; padding: 20px;
}
#modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 0.5px solid var(--border-light);
  border-radius: 16px; padding: 24px; max-width: 420px; width: 100%;
  max-height: 85vh; overflow-y: auto;
}
.modal h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px;
  color: var(--white); margin-bottom: 16px; text-align: center;
}
.modal-close {
  float: right; background: none; border: none; color: var(--muted);
  font-size: 22px; cursor: pointer; line-height: 1; margin-top: -4px;
}

/* ── DISTRIBUTION CHART ── */
.dist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.dist-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); width: 16px; }
.dist-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; overflow: hidden; height: 22px; }
.dist-bar {
  height: 100%; background: var(--correct); color: var(--correct-text);
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 8px; font-size: 12px; font-weight: 600; min-width: 26px;
  border-radius: 4px; transition: width 0.6s ease;
}
.dist-bar.zero { background: var(--absent); color: var(--absent-text); }

/* ── ACHIEVEMENTS ── */
.ach-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
.ach-card {
  background: var(--surface2); border: 0.5px solid var(--border);
  border-radius: 10px; padding: 12px; text-align: center;
  transition: all 0.2s;
}
.ach-card.unlocked { border-color: var(--gold-dim); background: rgba(212,160,23,0.08); }
.ach-icon { font-size: 26px; margin-bottom: 6px; filter: grayscale(1) opacity(0.4); }
.ach-card.unlocked .ach-icon { filter: none; }
.ach-name { font-size: 12px; font-weight: 600; color: var(--white); margin-bottom: 2px; }
.ach-desc { font-size: 10px; color: var(--muted); line-height: 1.3; }

/* Stats bar clickable hint */
#streak-bar { cursor: pointer; }

/* ── CATEGORY FILTER ── */
#cat-filter { width: 100%; display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.cat-chip {
  flex: 1; min-width: 70px; padding: 7px 8px;
  background: var(--surface); border: 1.5px solid var(--border-light);
  border-radius: 20px; color: var(--muted);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.cat-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(212,160,23,0.08); }

/* ── CURIOSITY BOX ── */
#curio-box {
  display: none; width: 100%; max-width: 380px;
  background: rgba(212,160,23,0.07);
  border: 0.5px solid var(--gold-dim);
  border-radius: 10px; padding: 12px 14px; margin: 4px auto 8px;
  font-size: 12px; color: var(--white); line-height: 1.5;
}
#curio-box .curio-tag {
  font-family: 'Bebas Neue', sans-serif; font-size: 13px;
  color: var(--gold); letter-spacing: 1px; display: block; margin-bottom: 3px;
}

/* ── HELP MODAL CONTENT ── */
.help-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.help-tiles { display: flex; gap: 3px; flex-shrink: 0; }
.help-tile {
  width: 30px; height: 30px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 15px;
  border: 1px solid var(--border-light);
}
.help-tile.correct { background: var(--correct); color: var(--correct-text); border-color: var(--correct); }
.help-tile.present { background: var(--present); color: var(--present-text); border-color: var(--present); }
.help-tile.absent  { background: var(--absent); color: var(--absent-text); border-color: var(--absent); }
.help-text { font-size: 12px; color: var(--muted); line-height: 1.4; }
.help-text b { color: var(--white); }
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">

  <header>
    <div>
      <div class="logo">FUT<span>WORD</span></div>
    </div>
    <div class="header-right">
      <div class="challenge-num" id="challenge-num">DESAFIO #1</div>
      <div class="tagline">Palavra do dia</div>
    </div>
  </header>

  <div id="streak-bar" onclick="openStats()">
    <div class="streak-item">
      <div class="streak-val" id="stat-streak">0</div>
      <div class="streak-lbl">Sequência</div>
    </div>
    <div class="streak-div"></div>
    <div class="streak-item">
      <div class="streak-val" id="stat-best">0</div>
      <div class="streak-lbl">Recorde</div>
    </div>
    <div class="streak-div"></div>
    <div class="streak-item">
      <div class="streak-val" id="stat-wins">0</div>
      <div class="streak-lbl">Vitórias</div>
    </div>
    <div class="streak-div"></div>
    <div class="streak-item">
      <div class="streak-val" id="stat-played">0</div>
      <div class="streak-lbl">Jogados</div>
    </div>
  </div>

  <div id="mode-tabs">
    <button class="mode-tab active" id="mode-daily" onclick="setMode('daily')">📅 Desafio do dia</button>
    <button class="mode-tab" id="mode-free" onclick="setMode('free')">♾️ Modo livre</button>
  </div>

  <div id="toolbar">
    <button class="tool-btn" id="btn-help" onclick="openHelp()" title="Como jogar">❓</button>
    <button class="tool-btn" id="btn-theme" onclick="toggleTheme()" title="Tema">🌙</button>
    <button class="tool-btn" id="btn-sound" onclick="toggleSound()" title="Som">🔊</button>
    <button class="tool-btn" onclick="openStats()" title="Estatísticas">📊</button>
    <button class="tool-btn" onclick="openAchievements()" title="Conquistas">🏆</button>
  </div>

  <div id="cat-filter" style="display:none;">
    <button class="cat-chip active" data-cat="todos" onclick="setCategory('todos')">Tudo</button>
    <button class="cat-chip" data-cat="termo" onclick="setCategory('termo')">⚽ Termos</button>
    <button class="cat-chip" data-cat="time" onclick="setCategory('time')">🛡 Times</button>
    <button class="cat-chip" data-cat="jogador" onclick="setCategory('jogador')">👤 Jogadores</button>
  </div>

  <div id="level-nav">
    <button class="lvl-btn active" id="lvl-0" onclick="selectLevel(0)">
      <span>5 LETRAS</span>
      <div class="lvl-dots" id="dots-0"></div>
    </button>
    <button class="lvl-btn locked" id="lvl-1" onclick="selectLevel(1)">
      <span>6 LETRAS</span>
      <div class="lvl-dots" id="dots-1"><span class="lvl-lock">🔒</span></div>
    </button>
    <button class="lvl-btn locked" id="lvl-2" onclick="selectLevel(2)">
      <span>7 LETRAS</span>
      <div class="lvl-dots" id="dots-2"><span class="lvl-lock">🔒</span></div>
    </button>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot correct"></div>Posição certa</div>
    <div class="legend-item"><div class="legend-dot present"></div>Letra certa</div>
    <div class="legend-item"><div class="legend-dot absent"></div>Não existe</div>
  </div>

  <div id="game-area">
    <div id="board"></div>
    <div id="status">
      <div id="message"></div>
      <div id="hint-box"></div>
    </div>
    <div id="curio-box"></div>
    <div id="btn-row">
      <button id="share-btn" onclick="shareLevel()">Texto 📋</button>
      <button id="share-img-btn" onclick="shareImage()">Imagem 🖼</button>
      <button id="next-level" onclick="goNextLevel()">PRÓXIMA FASE →</button>
    </div>
  </div>

  <div id="locked-msg">
    <div class="lock-icon">🔒</div>
    <p>Complete a fase anterior para desbloquear.</p>
  </div>

  <div id="completed-screen">
    <h2>⚽ Desafio completo!</h2>
    <p>Você completou os três níveis de hoje.<br>Volte amanhã para um novo desafio.</p>
    <div id="completed-emoji"></div>
    <div style="display:flex;gap:8px;">
      <button id="final-share" onclick="shareFinal()">Texto 📋</button>
      <button id="final-share-img" onclick="shareImage()">Imagem 🖼</button>
    </div>
  </div>

  <div id="keyboard"></div>

</div>

<div id="confetti"></div>

<div id="modal-overlay" onclick="closeModalBg(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── WORD LISTS ──────────────────────────────────────────────
const WORDS5 = [
  {word:"CHUTE",hint:"Movimento para bater na bola",cat:"termo"},
  {word:"TRAVE",hint:"A bola bateu na ___ e não entrou",cat:"termo",curio:"A distância entre as traves é de 7,32 metros, padrão FIFA."},
  {word:"FALTA",hint:"Infração marcada pelo árbitro",cat:"termo"},
  {word:"CAMPO",hint:"Onde acontece o jogo",cat:"termo"},
  {word:"LANCE",hint:"Momento decisivo do jogo",cat:"termo"},
  {word:"PASSE",hint:"Repasse da bola a um companheiro",cat:"termo"},

// ── DATE SEED ───────────────────────────────────────────────
const EPOCH = new Date("2025-01-01");
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}
function dayIndex() {
  const d = new Date(); d.setHours(0,0,0,0);
  return Math.floor((d - EPOCH) / 86400000);
}
function wordOfDay(list) {
  const idx = dayIndex() % list.length;
  return list[idx];
}

  { size: 5, list: WORDS5, valid: VALID5, tries: 6 },

// Stats from localStorage
let stats = { streak: 0, best: 0, wins: 0, played: 0, dist: [0,0,0,0,0,0], achievements: {} };

function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem("futword_stats") || "{}");
    stats = {
      streak: s.streak||0, best: s.best||0, wins: s.wins||0, played: s.played||0,
      dist: s.dist || [0,0,0,0,0,0], achievements: s.achievements || {}
    };
    const last = s.lastDay || "";
    const today = todayKey();
    if (last !== today) {
      const yesterday = (() => { const d=new Date(); d.setDate(d.getDate()-1); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; })();
      if (last !== yesterday && last !== "") stats.streak = 0;
    }
    soundOn = s.soundOn !== false;
  } catch(e) {}
}

function saveStats() {
  localStorage.setItem("futword_stats", JSON.stringify({ ...stats, lastDay: todayKey(), soundOn }));
}

function loadDayProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem("futword_day_" + todayKey()) || "null");
    if (saved) levelState = saved;
  } catch(e) {}
}

// ── LEVEL NAV ───────────────────────────────────────────────
function updateLevelNav() {
  LEVELS.forEach((_, i) => {
    const btn = document.getElementById("lvl-" + i);
    const dots = document.getElementById("dots-" + i);
    btn.className = "lvl-btn";
    const st = levelState[i];

    if (st && st.done) {
      btn.classList.add(i === curLevel ? "active done" : "done");
      dots.innerHTML = st.won ? "✓" : "✗";
    } else if (i === 0 || (levelState[i-1] && levelState[i-1].done)) {
      btn.classList.add(i === curLevel ? "active" : "");
      // build attempt dots
      const tries = st ? st.guesses : 0;
      dots.innerHTML = "";
      for (let d = 0; d < LEVELS[i].tries; d++) {
        const dot = document.createElement("div");
        dot.className = "lvl-dot";
        if (st && d < tries) dot.style.background = st.won && d === tries-1 ? "var(--correct)" : "var(--absent)";
        dots.appendChild(dot);
      }
    } else {
      btn.classList.add("locked");
      dots.innerHTML = '<span class="lvl-lock">🔒</span>';
    }
  });
}

function selectLevel(i) {
  // locked?
  if (i > 0 && !(levelState[i-1] && levelState[i-1].done)) {
    showToast("Complete a fase " + (i) + " primeiro!");
    return;
  }
  curLevel = i;
  updateLevelNav();
  renderLevel();
}

// ── RENDER LEVEL ────────────────────────────────────────────
function renderLevel() {
  const st = levelState[curLevel];
  const gameArea = document.getElementById("game-area");
  const lockedMsg = document.getElementById("locked-msg");
  const completedScreen = document.getElementById("completed-screen");
  const kb = document.getElementById("keyboard");

  completedScreen.style.display = "none";
  lockedMsg.style.display = "none";
  gameArea.style.display = "flex";
  gameArea.style.flexDirection = "column";
  gameArea.style.alignItems = "center";
  gameArea.style.width = "100%";
  kb.style.display = "flex";

  // All 3 done?
  if (levelState.every(s => s && s.done)) {
    gameArea.style.display = "none";
    kb.style.display = "none";
    showCompletedScreen();
    return;
  }

  if (st && st.done) {
    // Already finished this level — show result, no keyboard
    restoreFinishedLevel(st);
    return;
  }

  // Start fresh game for this level
  startGame();
}

function restoreFinishedLevel(st) {
  const lv = LEVELS[curLevel];
  buildBoard(lv.size, lv.tries);

  // Replay guesses
  st.rows.forEach((guess, r) => {
    const result = scoreGuess(guess, st.secret, lv.size);
    for (let c = 0; c < lv.size; c++) {
      const tile = document.getElementById(`t-${r}-${c}`);
      tile.textContent = guess[c];
      tile.classList.add(result[c]);
    }
  });

  const msg = document.getElementById("message");
  const hint = document.getElementById("hint-box");
  if (st.won) {
    msg.textContent = "⚽ Acertou!";
    msg.className = "win";
  } else {
    msg.textContent = "A palavra era: " + st.secret;
    msg.className = "lose";
    if (st.hint) hint.textContent = "💡 " + st.hint;
  }

  document.getElementById("btn-row").style.display = "flex";
  const nextBtn = document.getElementById("next-level");
  nextBtn.onclick = goNextLevel;
  if (curLevel < 2) {
    nextBtn.textContent = "PRÓXIMA FASE →";
    nextBtn.style.display = "inline-block";
  } else {
    nextBtn.style.display = "none";
  }
  document.getElementById("keyboard").style.display = "none";
}

function startGame() {
  const lv = LEVELS[curLevel];
  const entry = wordOfDay(lv.list);

  activeGame = {
    secret:   entry.word,
    hint:     entry.hint || "",
    curio:    entry.curio || "",
    size:     lv.size,
    tries:    lv.tries,
    curRow:   0,
    curCol:   0,
    gameOver: false,
    keyStates: {},
    emojiGrid: [],
    rows: [],
  };

  buildBoard(lv.size, lv.tries);
  buildKeyboard();
  document.getElementById("curio-box").style.display = "none";
  document.getElementById("message").textContent = "";
  document.getElementById("message").className = "";
  document.getElementById("hint-box").textContent = "";
  document.getElementById("btn-row").style.display = "none";
  document.getElementById("keyboard").style.display = "flex";
}

// ── BOARD ───────────────────────────────────────────────────
function buildBoard(size, tries) {
  const b = document.getElementById("board");
  b.innerHTML = "";
  // Adjust tile size for 6/7 letters
  const tileSize = size <= 5 ? 52 : size === 6 ? 46 : 40;
  const fontSize = size <= 5 ? 24 : size === 6 ? 20 : 18;

  for (let r = 0; r < tries; r++) {
    const row = document.createElement("div");
    row.className = "row";
    for (let c = 0; c < size; c++) {
      const t = document.createElement("div");
      t.className = "tile";
      t.id = `t-${r}-${c}`;
      t.style.width = tileSize + "px";
      t.style.height = tileSize + "px";
      t.style.fontSize = fontSize + "px";
      row.appendChild(t);
    }
    b.appendChild(row);
  }
}

// ── KEYBOARD ────────────────────────────────────────────────
const KB_ROWS = [
  ["Q","W","E","R","T","Y","U","I","O","P"],
  ["A","S","D","F","G","H","J","K","L"],
  ["ENTER","Z","X","C","V","B","N","M","DEL"]
];

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  KB_ROWS.forEach(keys => {
    const div = document.createElement("div");
    div.className = "kb-row";
    keys.forEach(k => {
      const btn = document.createElement("button");
      btn.className = "key" + (k.length > 1 ? " wide" : "");
      btn.textContent = k === "DEL" ? "⌫" : k;
      btn.dataset.key = k;
      btn.addEventListener("click", () => handleKey(k));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

// ── INPUT ───────────────────────────────────────────────────
function handleKey(k) {
  if (!activeGame || activeGame.gameOver) return;
  const g = activeGame;
  if (k === "DEL" || k === "BACKSPACE") {
    if (g.curCol > 0) {
      g.curCol--;
      const t = document.getElementById(`t-${g.curRow}-${g.curCol}`);
      t.textContent = "";
      t.classList.remove("filled");
    }
  } else if (k === "ENTER") {
    submitGuess();
  } else if (/^[A-Z]$/.test(k) && g.curCol < g.size) {
    const t = document.getElementById(`t-${g.curRow}-${g.curCol}`);
    t.textContent = k;
    t.classList.add("filled");
    g.curCol++;
    playSound("key");
  }
}

function getGuess() {
  const g = activeGame;
  return Array.from({length: g.size}, (_, i) => document.getElementById(`t-${g.curRow}-${i}`).textContent).join("");
}

function submitGuess() {
  const g = activeGame;
  if (g.curCol < g.size) { showToast("Complete a palavra!"); return; }
  const guess = getGuess();
  const lv = LEVELS[curLevel];
  if (!lv.valid.has(guess)) { showToast("Palavra não reconhecida"); return; }

  const result = scoreGuess(guess, g.secret, g.size);
  const emojis = result.map(r => r==="correct"?"🟩":r==="present"?"🟨":"⬛");
  g.emojiGrid.push(emojis.join(""));
  g.rows.push(guess);

  result.forEach((state, i) => {
    setTimeout(() => {
      const t = document.getElementById(`t-${g.curRow}-${i}`);
      t.classList.add("reveal", state);
    }, i * 80);
    const prev = g.keyStates[guess[i]];
    if (prev !== "correct") {
      if (state === "correct" || prev !== "present") g.keyStates[guess[i]] = state;
    }
  });
  setTimeout(() => updateKeyboard(), g.size * 80 + 100);

  if (guess === g.secret) {
    g.gameOver = true;
    setTimeout(() => onLevelEnd(true, g.curRow + 1), g.size * 80 + 200);
    return;
  }

  g.curRow++; g.curCol = 0;
  if (g.curRow === g.tries) {
    g.gameOver = true;
    setTimeout(() => onLevelEnd(false, g.tries), g.size * 80 + 200);
  }
}

function scoreGuess(guess, secret, size) {
  const result = Array(size).fill("absent");
  const sArr = secret.split(""), gArr = guess.split(""), used = Array(size).fill(false);
  for (let i = 0; i < size; i++) {
    if (gArr[i] === sArr[i]) { result[i]="correct"; used[i]=true; gArr[i]=null; }
  }
  for (let i = 0; i < size; i++) {
    if (result[i]==="correct") continue;
    for (let j = 0; j < size; j++) {
      if (!used[j] && gArr[i]===sArr[j]) { result[i]="present"; used[j]=true; break; }
    }
  }
  return result;
}

function updateKeyboard() {
  const g = activeGame;
  if (!g) return;
  document.querySelectorAll(".key").forEach(btn => {
    const k = btn.dataset.key;
    if (g.keyStates[k]) {
      btn.className = "key" + (k && k.length > 1 ? " wide" : "") + " " + g.keyStates[k];
    }
  });
}

// ── LEVEL END ───────────────────────────────────────────────
function onLevelEnd(won, triesUsed) {
  const g = activeGame;
  const msgs = {
    win:  ["⚽ Gol! Você acertou!", "🎯 Que chute certeiro!", "🏆 Perfeito! É gol!"],
    lose: ["Fim de jogo!", "Quase lá — tente amanhã!", "O goleiro pegou essa!"],
  };
  const el = document.getElementById("message");
  const hintEl = document.getElementById("hint-box");

  if (won) {
    el.textContent = msgs.win[Math.floor(Math.random()*msgs.win.length)];
    el.className = "win";
    playSound("win");
    fireConfetti();
  } else {
    el.textContent = "A palavra era: " + g.secret;
    el.className = "lose";
    if (g.hint) hintEl.textContent = "💡 " + g.hint;
    playSound("lose");
  }

  showCuriosity(g.secret, g.curio);

  // FREE MODE: don't touch daily state or stats
  if (mode === "free") {
    document.getElementById("btn-row").style.display = "flex";
    document.getElementById("keyboard").style.display = "none";
    const nb = document.getElementById("next-level");
    nb.textContent = "NOVA PALAVRA ↻";
    nb.style.display = "inline-block";
    nb.onclick = startFreeGame;
    checkAchievements({ won, triesUsed, size: g.size, mode: "free" });
    return;
  }

  // Save level state
  levelState[curLevel] = {
    done: true, won, secret: g.secret, hint: g.hint,
    guesses: triesUsed, rows: g.rows, emojiGrid: g.emojiGrid,
  };
  saveDayProgress();

  // Update stats only after completing all 3 levels (or on loss)
  if (!won || curLevel === 2) {
    stats.played++;
    if (won) { stats.wins++; stats.streak++; stats.best = Math.max(stats.best, stats.streak); }
    else { stats.streak = 0; }
    saveStats();
    updateStatsUI();
  }

  // Track distribution (daily, on win)
  if (won) {
    stats.dist = stats.dist || [0,0,0,0,0,0];
    stats.dist[triesUsed - 1]++;
    saveStats();
  }

  checkAchievements({ won, triesUsed, size: g.size, mode: "daily", allDone: levelState.every(s => s && s.done) });

  updateLevelNav();

  const nextBtn = document.getElementById("next-level");
  nextBtn.onclick = goNextLevel;
  document.getElementById("btn-row").style.display = "flex";
  document.getElementById("keyboard").style.display = "none";

  if (curLevel < 2 && won) {
    nextBtn.textContent = "PRÓXIMA FASE →";
    nextBtn.style.display = "inline-block";
  } else {
    nextBtn.style.display = "none";
  }

  // Check all done
  if (levelState.every(s => s && s.done)) {
    setTimeout(() => {
      document.getElementById("game-area").style.display = "none";
      showCompletedScreen();
    }, 1500);
  }
}

function goNextLevel() {
  if (curLevel < 2) selectLevel(curLevel + 1);
}

// ── COMPLETED ───────────────────────────────────────────────
function showCompletedScreen() {
  const screen = document.getElementById("completed-screen");
  screen.style.display = "flex";
  updateLevelNav();

  // Build emoji summary
  const lines = [];
  levelState.forEach((st, i) => {
    if (!st) return;
    const tag = ["5️⃣","6️⃣","7️⃣"][i];
    if (st.won) {
      lines.push(tag + " " + st.emojiGrid.join(" "));
    } else {
      lines.push(tag + " ✗");
    }
  });
  document.getElementById("completed-emoji").textContent = lines.join("\n");
}

function buildShareText() {
  const di = dayIndex();
  const lines = [`⚽ FutWord — Desafio #${di}`];
  levelState.forEach((st, i) => {
    if (!st) return;
    const label = ["5️⃣","6️⃣","7️⃣"][i];
    const tries = st.won ? `${st.guesses}/6` : "X/6";
    lines.push(`\n${label} ${tries}`);
    if (st.emojiGrid) lines.push(st.emojiGrid.join("\n"));
  });
  lines.push("\nJogue em: futword.com.br");
  return lines.join("\n");
}

function shareLevel() {
  const g = activeGame;
  if (!g) return;
  if (mode === "free") {
    const sizeTag = { 5:"5️⃣", 6:"6️⃣", 7:"7️⃣" }[g.size] || "⚽";
    const won = g.gameOver && g.rows[g.rows.length-1] === g.secret;
    const tries = won ? `${g.rows.length}/6` : "X/6";
    const text = `⚽ FutWord · Modo Livre ${sizeTag} ${tries}\n\n${g.emojiGrid.join("\n")}\n\nJogue em: futword.com.br`;
    doShare(text);
    return;
  }
  const st = levelState[curLevel];
  if (!st) return;

  const text = `⚽ FutWord #${di} ${label} ${tries}\n\n${st.emojiGrid.join("\n")}\n\nJogue em: futword.com.br`;
  doShare(text);
}

function shareFinal() { doShare(buildShareText()); }

function doShare(text) {
  if (navigator.share) {
    navigator.share({ text }).catch(() => copyText(text));
  } else {
    copyText(text);
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast("Resultado copiado!"));
}

// ── KEYBOARD EVENTS ─────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toUpperCase();
  if (k === "ENTER") handleKey("ENTER");
  else if (k === "BACKSPACE") handleKey("DEL");
  else if (/^[A-Z]$/.test(k)) handleKey(k);
});

// ── SOUND (Web Audio, no files) ─────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function beep(freq, dur, type, vol, delay) {
  const ctx = getAudio();
  if (!ctx) return;
  const t = ctx.currentTime + (delay || 0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol || 0.15, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t); osc.stop(t + dur);
}
function playSound(kind) {
  if (!soundOn) return;
  if (kind === "key")  beep(220, 0.05, "square", 0.04);
  else if (kind === "win")  { [523,659,784,1047].forEach((f,i) => beep(f, 0.3, "triangle", 0.18, i*0.1)); }
  else if (kind === "lose") { beep(200, 0.4, "sawtooth", 0.12); beep(150, 0.5, "sawtooth", 0.1, 0.15); }
  else if (kind === "tick") beep(440, 0.06, "sine", 0.08);
}
function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById("btn-sound");
  btn.textContent = soundOn ? "🔊" : "🔇";
  btn.classList.toggle("off", !soundOn);
  saveStats();
  if (soundOn) playSound("tick");
}

// ── CONFETTI ────────────────────────────────────────────────
function fireConfetti() {
  const container = document.getElementById("confetti");
  const colors = ["#d4a017","#2d7a2d","#c8f0c8","#ffd970","#f0f4f0"];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random()*100 + "%";
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? "50%" : "1px";
    const dur = 1.6 + Math.random()*1.6;
    const xDrift = (Math.random()-0.5)*200;
    const rot = Math.random()*720;
    p.animate([
      { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
      { transform: `translate(${xDrift}px, ${window.innerHeight + 40}px) rotate(${rot}deg)`, opacity: 0.9 }
    ], { duration: dur*1000, easing: "cubic-bezier(0.2,0.6,0.4,1)" });
    container.appendChild(p);
    setTimeout(() => p.remove(), dur*1000);
  }
}

// ── MODE SWITCH ─────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById("mode-daily").classList.toggle("active", m === "daily");
  document.getElementById("mode-free").classList.toggle("active", m === "free");
  document.getElementById("level-nav").style.display = m === "daily" ? "flex" : "none";
  document.getElementById("cat-filter").style.display = m === "free" ? "flex" : "none";
  document.getElementById("completed-screen").style.display = "none";
  document.getElementById("challenge-num").textContent = m === "daily" ? ("DESAFIO #" + dayIndex()) : "MODO LIVRE";
  document.querySelector(".tagline").textContent = m === "daily" ? "Palavra do dia" : "Jogue à vontade";

  if (m === "free") {
    startFreeGame();
  } else {
    curLevel = 0;
    updateLevelNav();
    renderLevel();
  }
}

let freeCategory = "todos";
function setCategory(cat) {
  freeCategory = cat;
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.toggle("active", c.dataset.cat === cat));
  startFreeGame();
}

function startFreeGame() {
  // Pool respects category filter across all levels
  let pool = [];
  LEVELS.forEach((lv, idx) => {
    lv.list.forEach(w => {
      if (freeCategory === "todos" || (w.cat || "termo") === freeCategory) {
        pool.push({ ...w, lvIdx: idx });
      }
    });
  });
  if (!pool.length) { showToast("Sem palavras nessa categoria"); return; }

  const entry = pool[Math.floor(Math.random() * pool.length)];
  curLevel = entry.lvIdx;
  const lv = LEVELS[entry.lvIdx];

  activeGame = {
    secret: entry.word, hint: entry.hint || "", curio: entry.curio || "",
    size: lv.size, tries: lv.tries,
    curRow: 0, curCol: 0, gameOver: false, keyStates: {}, emojiGrid: [], rows: [],
  };

  document.getElementById("game-area").style.display = "flex";
  document.getElementById("game-area").style.flexDirection = "column";
  document.getElementById("game-area").style.alignItems = "center";
  document.getElementById("completed-screen").style.display = "none";
  document.getElementById("locked-msg").style.display = "none";
  document.getElementById("curio-box").style.display = "none";

  buildBoard(lv.size, lv.tries);
  buildKeyboard();
  const catLabel = { todos:"", termo:"⚽ Termo", time:"🛡 Time", jogador:"👤 Jogador" }[freeCategory];
  document.getElementById("message").textContent = "Modo livre · " + lv.size + " letras" + (catLabel ? " · " + catLabel : "");
  document.getElementById("message").className = "";
  document.getElementById("hint-box").textContent = "";
  document.getElementById("btn-row").style.display = "none";
  document.getElementById("keyboard").style.display = "flex";
}

// ── ACHIEVEMENTS ────────────────────────────────────────────
const ACHIEVEMENTS = [
  { id: "first_win",  icon: "⚽", name: "Primeiro gol",    desc: "Acerte sua primeira palavra" },
  { id: "hole_in_one",icon: "🎯", name: "De primeira",     desc: "Acerte na 1ª tentativa" },
  { id: "hat_trick",  icon: "🏆", name: "Hat-trick",       desc: "Complete os 3 níveis no mesmo dia" },
  { id: "streak3",    icon: "🔥", name: "Embalado",        desc: "Sequência de 3 dias" },
  { id: "streak7",    icon: "⭐", name: "Artilheiro",      desc: "Sequência de 7 dias" },
  { id: "no_miss",    icon: "🧤", name: "Sem sustos",      desc: "Vença sem nenhuma letra errada" },
  { id: "seven_letter",icon:"💎", name: "Craque",          desc: "Acerte uma palavra de 7 letras" },
  { id: "free_10",    icon: "♾️", name: "Maratonista",     desc: "Vença 10 vezes no modo livre" },
];

function checkAchievements(ctx) {
  const a = stats.achievements;
  const newly = [];
  function unlock(id) { if (!a[id]) { a[id] = true; newly.push(id); } }

  if (ctx.won) unlock("first_win");
  if (ctx.won && ctx.triesUsed === 1) unlock("hole_in_one");
  if (ctx.won && ctx.size === 7) unlock("seven_letter");
  if (ctx.allDone && [0,1,2].every(i => levelState[i] && levelState[i].won)) unlock("hat_trick");
  if (stats.streak >= 3) unlock("streak3");
  if (stats.streak >= 7) unlock("streak7");

  // "No miss" = won and every guessed letter was used in the word (no absent tiles)
  if (ctx.won && activeGame) {
    const hadAbsent = Object.values(activeGame.keyStates).includes("absent");
    if (!hadAbsent) unlock("no_miss");
  }

  // Free mode wins counter
  if (ctx.mode === "free" && ctx.won) {
    stats.freeWins = (stats.freeWins || 0) + 1;
    if (stats.freeWins >= 10) unlock("free_10");
  }

  saveStats();
  if (newly.length) {
    newly.forEach((id, i) => {
      const ach = ACHIEVEMENTS.find(x => x.id === id);
      setTimeout(() => showToast(ach.icon + " Conquista: " + ach.name), 600 + i*1400);
    });
  }
}

// ── MODAL ───────────────────────────────────────────────────
function openModal(html) {
  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal-overlay").classList.add("show");
}
function closeModal() { document.getElementById("modal-overlay").classList.remove("show"); }
function closeModalBg(e) { if (e.target.id === "modal-overlay") closeModal(); }

function openStats() {
  const totalWins = stats.dist.reduce((a,b)=>a+b, 0);
  const maxDist = Math.max(1, ...stats.dist);
  let bars = "";
  stats.dist.forEach((count, i) => {
    const pct = Math.round((count / maxDist) * 100);
    bars += `<div class="dist-row">
      <div class="dist-label">${i+1}</div>
      <div class="dist-bar-wrap"><div class="dist-bar ${count===0?'zero':''}" style="width:${Math.max(pct,8)}%">${count}</div></div>
    </div>`;
  });
  const winRate = stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) : 0;
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>📊 Estatísticas</h2>
    <div style="display:flex;justify-content:space-around;margin-bottom:20px;text-align:center;">
      <div><div style="font-family:'Bebas Neue';font-size:30px;color:var(--gold);">${stats.played}</div><div style="font-size:10px;color:var(--muted);">JOGADOS</div></div>
      <div><div style="font-family:'Bebas Neue';font-size:30px;color:var(--gold);">${winRate}%</div><div style="font-size:10px;color:var(--muted);">VITÓRIAS</div></div>
      <div><div style="font-family:'Bebas Neue';font-size:30px;color:var(--gold);">${stats.streak}</div><div style="font-size:10px;color:var(--muted);">SEQUÊNCIA</div></div>
      <div><div style="font-family:'Bebas Neue';font-size:30px;color:var(--gold);">${stats.best}</div><div style="font-size:10px;color:var(--muted);">RECORDE</div></div>
    </div>
    <h2 style="font-size:16px;margin-bottom:10px;">Distribuição de tentativas</h2>
    ${bars}
  `);
}

function openAchievements() {
  const unlocked = Object.keys(stats.achievements || {}).length;
  let cards = "";
  ACHIEVEMENTS.forEach(a => {
    const on = stats.achievements && stats.achievements[a.id];
    cards += `<div class="ach-card ${on?'unlocked':''}">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${on ? a.desc : '🔒 ' + a.desc}</div>
    </div>`;
  });
  openModal(`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2>🏆 Conquistas (${unlocked}/${ACHIEVEMENTS.length})</h2>
    <div class="ach-grid">${cards}</div>
  `);
}

// ── IMAGE SHARE (canvas) ────────────────────────────────────
function shareImage() {
  const W = 600, pad = 40;
  // Collect grids to render
  let grids = [];
  if (mode === "free" && activeGame) {
    grids.push({ label: activeGame.size + " letras", emoji: activeGame.emojiGrid });
  } else {
    levelState.forEach((st, i) => {
      if (st) grids.push({ label: ["5 letras","6 letras","7 letras"][i], emoji: st.emojiGrid, won: st.won });
    });
  }
  if (!grids.length && activeGame) {
    const st = levelState[curLevel];
    if (st) grids.push({ label: activeGame.size + " letras", emoji: st.emojiGrid });
  }

  const rowsTotal = grids.reduce((a,g) => a + g.emoji.length + 1, 0);
  const cell = 44, gap = 6;
  const headerH = 150;
  const H = headerH + rowsTotal * (cell + gap) + pad * 2 + grids.length * 20;

  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  // BG
  ctx.fillStyle = lightTheme ? "#eef3ea" : "#080d08";
  ctx.fillRect(0, 0, W, H);
  // glow
  const grad = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, W);
  grad.addColorStop(0, "rgba(45,122,45,0.25)");
  grad.addColorStop(1, "transparent");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, 300);

  // Title
  ctx.textAlign = "center";
  ctx.fillStyle = lightTheme ? "#1a2e1a" : "#f0f4f0";
  ctx.font = "bold 52px Arial";
  ctx.fillText("⚽ FUTWORD", W/2, 70);
  ctx.fillStyle = "#d4a017";
  ctx.font = "bold 26px Arial";
  const sub = mode === "free" ? "Modo Livre" : "Desafio #" + dayIndex();
  ctx.fillText(sub, W/2, 110);

  // Grids
  let y = headerH;
  const colors = { "🟩": "#2d7a2d", "🟨": "#8a6200", "⬛": lightTheme ? "#c2cdba" : "#1e261e" };
  grids.forEach(g => {
    ctx.fillStyle = lightTheme ? "#5a7a5a" : "#7a9a7a";
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "left";
    ctx.fillText(g.label.toUpperCase(), pad, y);
    y += 18;

    g.emoji.forEach(rowStr => {
      const cells = Array.from(rowStr);
      const rowW = cells.length * (cell + gap) - gap;
      let x = (W - rowW) / 2;
      cells.forEach(em => {
        ctx.fillStyle = colors[em] || "#1e261e";
        roundRect(ctx, x, y, cell, cell, 6);
        ctx.fill();
        x += cell + gap;
      });
      y += cell + gap;
    });
    y += 14;
  });

  // Footer
  ctx.fillStyle = lightTheme ? "#5a7a5a" : "#7a9a7a";
  ctx.font = "18px Arial";
  ctx.textAlign = "center";
  ctx.fillText("futword.com.br", W/2, H - 24);

  canvas.toBlob(blob => {
    const file = new File([blob], "futword.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], text: "⚽ FutWord" }).catch(() => downloadBlob(blob));
    } else {
      downloadBlob(blob);
    }
  }, "image/png");
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function downloadBlob(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "futword.png";
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast("Imagem baixada!");
}
