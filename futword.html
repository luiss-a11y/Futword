<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="FutWord — o jogo de palavras do futebol brasileiro">
<meta name="theme-color" content="#0a0f0a">
<title>FutWord ⚽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --grass: #1a4a1a;
  --grass-light: #22592a;
  --grass-dim: #112d11;
  --pitch-line: #2e6e30;
  --gold: #d4a017;
  --gold-dim: #a07810;
  --white: #f0f4f0;
  --muted: #7a9a7a;
  --bg: #080d08;
  --surface: #0e160e;
  --surface2: #141e14;
  --correct: #2d7a2d;
  --correct-text: #c8f0c8;
  --present: #8a6200;
  --present-text: #ffd970;
  --absent: #1e261e;
  --absent-text: #4a664a;
  --border: #1e2e1e;
  --border-light: #2a3e2a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

/* Ambient stadium glow */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 140%;
  height: 60%;
  background: radial-gradient(ellipse at top, rgba(30, 90, 30, 0.18) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 12px 24px;
}

/* ── HEADER ── */
header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 12px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 14px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 4px;
  color: var(--white);
  line-height: 1;
}

.logo span {
  color: var(--gold);
}

.tagline {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.4;
}

/* ── SCOREBOARD ── */
#scoreboard {
  width: 100%;
  background: var(--surface);
  border: 0.5px solid var(--border-light);
  border-radius: 12px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

#scoreboard::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 48px,
    rgba(46, 110, 48, 0.06) 48px,
    rgba(46, 110, 48, 0.06) 49px
  );
  pointer-events: none;
}

.score-side {
  text-align: center;
  flex: 1;
  position: relative;
}

.score-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.score-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  line-height: 1;
  color: var(--white);
  transition: transform 0.2s, color 0.2s;
}

.score-num.bump {
  transform: scale(1.3);
  color: var(--gold);
}

.score-divider {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--pitch-line);
  padding: 0 12px;
  position: relative;
}

/* ── BOARD ── */
#board {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 10px;
}

.row {
  display: flex;
  gap: 5px;
}

.tile {
  width: 58px;
  height: 58px;
  border: 1.5px solid var(--border-light);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: var(--white);
  text-transform: uppercase;
  background: var(--surface);
  transition: border-color 0.15s, transform 0.1s;
  position: relative;
}

.tile.filled {
  border-color: var(--border-light);
  transform: scale(1.05);
}

.tile.correct {
  background: var(--correct);
  border-color: var(--correct);
  color: var(--correct-text);
  transform: none;
}

.tile.present {
  background: var(--present);
  border-color: var(--present);
  color: var(--present-text);
  transform: none;
}

.tile.absent {
  background: var(--absent);
  border-color: var(--absent);
  color: var(--absent-text);
  transform: none;
}

.tile.reveal {
  animation: flip 0.4s ease forwards;
}

@keyframes flip {
  0%   { transform: rotateX(0deg); }
  50%  { transform: rotateX(90deg); opacity: 0.5; }
  100% { transform: rotateX(0deg); opacity: 1; }
}

/* ── STATUS ── */
#status {
  min-height: 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 8px;
}

#message {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-align: center;
}

#message.win  { color: #6dbe6d; font-weight: 600; }
#message.lose { color: #d46060; }

#hint-box {
  font-size: 11px;
  color: var(--gold-dim);
  text-align: center;
}

/* ── KEYBOARD ── */
#keyboard {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 7px;
  align-items: center;
  margin-bottom: 12px;
}

.kb-row {
  display: flex;
  gap: 5px;
  justify-content: center;
}

.key {
  width: 36px;
  height: 50px;
  padding: 0;
  background: var(--surface2);
  border: 1.5px solid var(--border-light);
  border-bottom: 3px solid #0d160d;
  border-radius: 6px;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-transform: uppercase;
  user-select: none;
  transition: background 0.15s, color 0.15s, transform 0.08s, border-bottom 0.08s;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}

.key:active {
  transform: translateY(2px);
  border-bottom-width: 1px;
}

.key.wide {
  width: 54px;
  font-size: 11px;
  letter-spacing: 0.5px;
}

.key.correct { background: var(--correct); border-color: var(--correct); color: var(--correct-text); }
.key.present { background: var(--present); border-color: var(--present); color: var(--present-text); }
.key.absent  { background: var(--absent);  border-color: var(--absent);  color: var(--absent-text); }

/* ── END BUTTONS ── */
#btn-row {
  display: none;
  gap: 8px;
  width: 100%;
  justify-content: center;
}

#play-again {
  padding: 10px 24px;
  background: var(--correct);
  border: none;
  border-radius: 8px;
  color: var(--correct-text);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
}

#play-again:active { transform: scale(0.97); opacity: 0.85; }

#share-btn {
  padding: 10px 20px;
  background: transparent;
  border: 0.5px solid var(--border-light);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

#share-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── LEGEND ── */
#legend {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
}

.legend-dot.correct { background: var(--correct); }
.legend-dot.present { background: var(--present); }
.legend-dot.absent  { background: var(--absent); border: 0.5px solid var(--border-light); }

/* ── TOAST ── */
#toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-60px);
  background: var(--surface2);
  border: 0.5px solid var(--border-light);
  color: var(--white);
  font-size: 13px;
  padding: 8px 20px;
  border-radius: 20px;
  transition: transform 0.3s ease;
  z-index: 100;
  white-space: nowrap;
}

#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 400px) {
  .tile { width: 50px; height: 50px; font-size: 22px; }
  .key  { width: 31px; height: 46px; font-size: 12px; }
  .key.wide { width: 48px; }
  .score-num { font-size: 40px; }
}

@media (max-width: 340px) {
  .tile { width: 44px; height: 44px; font-size: 20px; }
  .key  { width: 27px; height: 42px; font-size: 11px; }
  .key.wide { width: 42px; }
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">

  <header>
    <div>
      <div class="logo">FUT<span>WORD</span></div>
    </div>
    <div class="tagline">O jogo de palavras<br>do futebol</div>
  </header>

  <div id="scoreboard">
    <div class="score-side">
      <div class="score-label">⚽ Jogador</div>
      <div class="score-num" id="score-p">0</div>
    </div>
    <div class="score-divider">×</div>
    <div class="score-side">
      <div class="score-label">🏟 FutWord</div>
      <div class="score-num" id="score-c">0</div>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot correct"></div>Posição certa</div>
    <div class="legend-item"><div class="legend-dot present"></div>Letra certa</div>
    <div class="legend-item"><div class="legend-dot absent"></div>Não existe</div>
  </div>

  <div id="board"></div>

  <div id="status">
    <div id="message"></div>
    <div id="hint-box"></div>
  </div>

  <div id="keyboard"></div>

  <div id="btn-row">
    <button id="share-btn" onclick="shareResult()">Compartilhar 📋</button>
    <button id="play-again" onclick="newGame()">PRÓXIMA PALAVRA</button>
  </div>

</div>

<script>
const WORDS = [
  {word:"CHUTE",hint:"Movimento para bater na bola"},
  {word:"TRAVE",hint:"A bola bateu na ___ e não entrou"},
  {word:"FALTA",hint:"Infração marcada pelo árbitro"},
  {word:"CAMPO",hint:"Onde acontece o jogo"},
  {word:"CLUBE",hint:"Agremiação esportiva"},
  {word:"LANCE",hint:"Momento decisivo do jogo"},
  {word:"PASSE",hint:"Repasse da bola a um companheiro"},
  {word:"BANCO",hint:"Onde os reservas ficam sentados"},
  {word:"CANTO",hint:"Cobrança de escanteio"},
  {word:"ARENA",hint:"Estádio moderno"},
  {word:"POSSE",hint:"Domínio da bola"},
  {word:"RIVAL",hint:"Time adversário"},
  {word:"CURVA",hint:"Trajetória da bola em falta cobrada"},
  {word:"RECUO",hint:"Passe para trás para o goleiro"},
  {word:"LINHA",hint:"Demarcação do campo"},
  {word:"BLOCO",hint:"Formação defensiva compacta"},
  {word:"SALTO",hint:"Pular para cabecear"},
  {word:"LIVRE",hint:"Cobrança de falta direta"},
  {word:"GARRA",hint:"Raça e determinação em campo"},
  {word:"MARTA",hint:"Maior jogadora da história do futebol brasileiro"},
  {word:"ZAGUE",hint:"Linha defensiva do time"},
  {word:"CORTE",hint:"Interceptação defensiva da bola"},
  {word:"DUPLA",hint:"Parceria entre dois atacantes"},
  {word:"TEMPO",hint:"Cada metade da partida tem um"},
  {word:"VERDE",hint:"Cor do gramado"},
  {word:"TURNO",hint:"Primeiro ou segundo ___ do campeonato"},
  {word:"CRAVO",hint:"Trava da chuteira"},
  {word:"PERNA",hint:"Principal ferramenta do jogador"},
  {word:"APOIO",hint:"Jogador que serve de suporte"},
  {word:"GOLPE",hint:"Batida certeira a gol"},
  {word:"PALCO",hint:"O estádio é o ___ do futebol"},
  {word:"BEIRA",hint:"___ de campo, a linha lateral"},
  {word:"RUBRO",hint:"Cor do Flamengo e outros times"},
  {word:"VIROU",hint:"O time ___ o placar no segundo tempo"},
  {word:"SUSTO",hint:"O goleiro levou um ___ com a finalização"},
  {word:"ATACA",hint:"O time ___ em busca do gol"},
  {word:"CALMA",hint:"O técnico pediu ___ ao elenco"},
];

const EXTRA = ["BOLAS","JOGOS","FORTE","COSTAS","BRAVO","CHUVA","VOLTA","VELOZ","FRACO","JUNTO","OUTRO","POUCO","QUEDA","SAIDA","SALVA","SINAL","VENTO","LADO","PESO","RISCO","NOITE","OLHAR","MANGA","MARCA","MEDIA","MUNDO","NUNCA","NORTE","CARTA","CERTO","PERDA","PALMA","MAGIA","MOTOR","TROÇO","VISAO","TOQUE","BAIXO","LARGO","LENTO","PLANO","PRAZO","RASTO","VISTA","TURNO"];
const ALL_VALID = new Set([...WORDS.map(w => w.word), ...EXTRA.filter(w => w.length === 5)]);

let secret, wordHint, board, curRow, curCol, gameOver, keyStates, emojiGrid;
let scoreP = 0, scoreC = 0, usedWords = new Set();
let lastResult = "";

function pickWord() {
  let pool = WORDS.filter(w => !usedWords.has(w.word));
  if (!pool.length) { usedWords.clear(); pool = WORDS; }
  return pool[Math.floor(Math.random() * pool.length)];
}

function newGame() {
  const entry = pickWord();
  secret = entry.word;
  wordHint = entry.hint || "";
  usedWords.add(secret);
  curRow = 0; curCol = 0; gameOver = false; keyStates = {}; emojiGrid = [];
  buildBoard(); buildKeyboard();
  document.getElementById("message").textContent = "";
  document.getElementById("message").className = "";
  document.getElementById("hint-box").textContent = "";
  document.getElementById("btn-row").style.display = "none";
}

function buildBoard() {
  const b = document.getElementById("board");
  b.innerHTML = ""; board = [];
  for (let r = 0; r < 6; r++) {
    const row = document.createElement("div");
    row.className = "row"; board.push([]);
    for (let c = 0; c < 5; c++) {
      const t = document.createElement("div");
      t.className = "tile";
      row.appendChild(t); board[r].push(t);
    }
    b.appendChild(row);
  }
}

const KB_ROWS = ["QWERTYUIOP", "ASDFGHJKL", "ENTER-ZXCVBNM-DEL"];

function buildKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  KB_ROWS.forEach(rowStr => {
    const div = document.createElement("div");
    div.className = "kb-row";
    rowStr.split("-").forEach(k => {
      const btn = document.createElement("button");
      btn.className = "key" + (k.length > 1 ? " wide" : "");
      btn.textContent = k === "DEL" ? "⌫" : k;
      btn.dataset.key = k;
      btn.addEventListener("click", () => handleKey(k));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function handleKey(k) {
  if (gameOver) return;
  if (k === "DEL" || k === "BACKSPACE") {
    if (curCol > 0) {
      curCol--;
      board[curRow][curCol].textContent = "";
      board[curRow][curCol].classList.remove("filled");
    }
  } else if (k === "ENTER") {
    submitGuess();
  } else if (/^[A-ZÇ]$/.test(k) && curCol < 5) {
    const t = board[curRow][curCol];
    t.textContent = k;
    t.classList.add("filled");
    curCol++;
  }
}

function getGuess() {
  return Array.from({ length: 5 }, (_, i) => board[curRow][i].textContent).join("");
}

function submitGuess() {
  if (curCol < 5) { showToast("Complete a palavra!"); return; }
  const guess = getGuess();
  if (!ALL_VALID.has(guess) && !WORDS.find(w => w.word === guess)) {
    showToast("Palavra não reconhecida");
    return;
  }

  const result = scoreGuess(guess, secret);
  const emojis = result.map(r => r === "correct" ? "🟩" : r === "present" ? "🟨" : "⬛");
  emojiGrid.push(emojis.join(""));

  result.forEach((state, i) => {
    const t = board[curRow][i];
    setTimeout(() => {
      t.classList.add("reveal", state);
    }, i * 80);

    const prev = keyStates[guess[i]];
    if (prev !== "correct") {
      if (state === "correct" || prev !== "present") keyStates[guess[i]] = state;
    }
  });

  setTimeout(() => updateKeyboard(), 5 * 80 + 100);

  if (guess === secret) {
    gameOver = true;
    scoreP++;
    bumpScore("score-p");
    const msgs = ["⚽ Gol! Você acertou!", "🎯 Que chute certeiro!", "🏆 Perfeito! É gol!"];
    setTimeout(() => {
      const el = document.getElementById("message");
      el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      el.className = "win";
      buildShareResult(true);
      document.getElementById("btn-row").style.display = "flex";
    }, 5 * 80 + 200);
    return;
  }

  curRow++; curCol = 0;
  if (curRow === 6) {
    gameOver = true;
    scoreC++;
    bumpScore("score-c");
    setTimeout(() => {
      const el = document.getElementById("message");
      el.textContent = "Fim de jogo! A palavra era: " + secret;
      el.className = "lose";
      if (wordHint) document.getElementById("hint-box").textContent = "💡 " + wordHint;
      buildShareResult(false);
      document.getElementById("btn-row").style.display = "flex";
    }, 5 * 80 + 200);
  }
}

function scoreGuess(guess, secret) {
  const result = Array(5).fill("absent");
  const sArr = secret.split(""), gArr = guess.split(""), used = Array(5).fill(false);
  for (let i = 0; i < 5; i++) {
    if (gArr[i] === sArr[i]) { result[i] = "correct"; used[i] = true; gArr[i] = null; }
  }
  for (let i = 0; i < 5; i++) {
    if (result[i] === "correct") continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && gArr[i] === sArr[j]) { result[i] = "present"; used[j] = true; break; }
    }
  }
  return result;
}

function updateKeyboard() {
  document.querySelectorAll(".key").forEach(btn => {
    const k = btn.dataset.key;
    if (keyStates[k]) {
      btn.className = "key" + (k && k.length > 1 ? " wide" : "") + " " + keyStates[k];
    }
  });
}

function bumpScore(id) {
  const el = document.getElementById(id);
  el.textContent = id === "score-p" ? scoreP : scoreC;
  el.classList.add("bump");
  setTimeout(() => el.classList.remove("bump"), 400);
}

function buildShareResult(won) {
  const tries = won ? `${curRow + 1}/6` : "X/6";
  lastResult = `⚽ FutWord\nJogador ${scoreP} × ${scoreC} FutWord\n${tries}\n\n${emojiGrid.join("\n")}\n\nJogue em: futword.com.br`;
}

function shareResult() {
  if (navigator.share) {
    navigator.share({ text: lastResult }).catch(() => copyToClipboard());
  } else {
    copyToClipboard();
  }
}

function copyToClipboard() {
  navigator.clipboard.writeText(lastResult).then(() => {
    showToast("Resultado copiado!");
  });
}

document.addEventListener("keydown", e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toUpperCase();
  if (k === "ENTER") handleKey("ENTER");
  else if (k === "BACKSPACE") handleKey("DEL");
  else if (/^[A-Z]$/.test(k)) handleKey(k);
});

newGame();
</script>
</body>
</html>
